<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBME Fix Verification Tests</title>
  <style>
    body { margin: 32px; background: #fff; color: #1a1a1a; font-family: -apple-system, Arial, sans-serif; font-size: 14px; }
    h1 { font-size: 20px; margin-bottom: 24px; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; }
    #results { max-width: 800px; }
  </style>
</head>
<body>
  <h1>NBME Fix Verification Tests</h1>
  <div id="results"></div>

  <script>
    function pass(name) {
      const d = document.createElement('div');
      d.style.cssText = 'padding:8px 12px;margin:4px 0;background:#d4edda;border-left:4px solid #28a745;font-family:monospace';
      d.innerHTML = '✅ PASS — ' + name;
      document.getElementById('results').appendChild(d);
    }

    function fail(name, reason) {
      const d = document.createElement('div');
      d.style.cssText = 'padding:8px 12px;margin:4px 0;background:#f8d7da;border-left:4px solid #dc3545;font-family:monospace';
      d.innerHTML = '❌ FAIL — ' + name + '<br><small>' + reason + '</small>';
      document.getElementById('results').appendChild(d);
    }

    function info(msg) {
      const d = document.createElement('div');
      d.style.cssText = 'padding:8px 12px;margin:4px 0;background:#fff3cd;border-left:4px solid #ffc107;font-family:monospace';
      d.innerHTML = 'ℹ️ ' + msg;
      document.getElementById('results').appendChild(d);
    }

    // ===== TESTS GO HERE =====
    // Each test will be added here by subsequent prompts

    // --- hasFigureReference() built from regexes copied verbatim from index.html ---
    function hasFigureReference(text) {
      const _FIGURE_RE = /\b(figure|fig\.?)\s*\d+/i;
      const _FIGURE_KW = /\b(shown\s+(?:below|above|here)|image|photograph|radiograph|graph|exhibit)\b/i;
      return _FIGURE_RE.test(text) || _FIGURE_KW.test(text);
    }

    // --- renderStem() wraps buildStemHTML logic copied verbatim from index.html ---
    const _LAB_TABLE_RE = /^([A-Za-z][A-Za-z0-9 \+\-²³⁻]*?)\s+([\d.]+)\s*(mEq\/L|mg\/dL|mm\s*Hg|%|\/mm\s*3|µU\/ml|ng\/dl|µg\/dl|IU\/L|g\/dL)/i;
    function _esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function renderStem(paragraphs) {
      const paras = paragraphs.map(p => p.trim()).filter(Boolean);
      if (!paras.length) return '';
      let html = '';
      let i = 0;
      while (i < paras.length) {
        if (paras[i].startsWith('__FIGURE__:')) {
          const src = paras[i].slice('__FIGURE__:'.length);
          html += `<img src="${src}" style="max-width:100%;border:1px solid #ccc;margin:8px 0;display:block;" alt="Figure" />`;
          i++;
        } else if (_LAB_TABLE_RE.test(paras[i])) {
          let rows = '';
          while (i < paras.length && _LAB_TABLE_RE.test(paras[i])) {
            const m = paras[i].match(_LAB_TABLE_RE);
            const name = _esc(m[1].trim());
            const val  = _esc(paras[i].slice(m[1].length).trim());
            rows += `<tr><td>${name}</td><td>${val}</td></tr>`;
            i++;
          }
          html += `<table class="lab-values-table"><tbody>${rows}</tbody></table>`;
        } else {
          html += `<p>${_esc(paras[i])}</p>`;
          i++;
        }
      }
      return html;
    }

    // --- splitLabValues() + supporting constants copied verbatim from index.html OCR module ---
    const _LAB_UNIT = 'mEq\\/L|mg\\/dL|mm\\s*Hg|%|\\/mm\\s*3|µU\\/ml|ng\\/dl|µg\\/dl|IU\\/L|g\\/dL';
    const _LAB_RE   = new RegExp(
      '[A-Za-z][A-Za-z0-9\\s\\+\\-]*?\\s+[\\d.]+\\s*(?:' + _LAB_UNIT + ')',
      'gi'
    );
    function splitLabValues(line) {
      _LAB_RE.lastIndex = 0;
      const matches = [];
      let m;
      while ((m = _LAB_RE.exec(line)) !== null) {
        matches.push({ start: m.index, end: m.index + m[0].length });
      }
      if (matches.length < 2) return [line];
      const parts = [];
      const pre = line.slice(0, matches[0].start).trim();
      if (pre) parts.push(pre);
      for (const { start, end } of matches) {
        parts.push(line.slice(start, end).trim());
      }
      const post = line.slice(matches[matches.length - 1].end).trim();
      if (post) parts.push(post);
      return parts.filter(Boolean);
    }

    // --- joinItems() copied verbatim from index.html OCR module ---
    function joinItems(items) {
      if (!items.length) return '';
      let result = items[0].str;
      for (let i = 1; i < items.length; i++) {
        const prev = items[i - 1];
        const curr = items[i];

        const prevWord = /[A-Za-z0-9]$/.test(result);
        const nextWord = /^[A-Za-z0-9]/.test(curr.str);

        if (!prevWord || !nextWord) {
          // Non-word boundary — always insert space
          result += ' ' + curr.str;
          continue;
        }

        // Estimate the font size from the transform matrix (index 0 = scaleX)
        // PDF.js transform: [scaleX, skewX, skewY, scaleY, x, y]
        const fontSize = prev.transform ? Math.abs(prev.transform[0]) : 10;
        // Approximate char width = fontSize * 0.5 (rough average for most fonts)
        const estCharW = fontSize * 0.5;

        // Calculate gap using x0 of current and x1 of previous
        // x1 = x0 + |width|, but width is unreliable, so also estimate it
        const prevX1_reported = prev.x0 + Math.abs(prev.width || 0);
        const prevX1_estimated = prev.x0 + (prev.str.length * estCharW);
        // Use whichever is more plausible (closer to current x0)
        const gapReported  = curr.x0 - prevX1_reported;
        const gapEstimated = curr.x0 - prevX1_estimated;
        // If reported width is 0 or gives a huge gap, use estimated
        const gap = (Math.abs(prev.width || 0) < 0.1)
          ? gapEstimated
          : gapReported;

        // Phantom if gap < 60% of estimated char width
        const phantom = gap < estCharW * 0.6;
        result += (phantom ? '' : ' ') + curr.str;
      }
      return result.trim();
    }

    function runTests() {
      // ----- OPT_RE / CA_RE (answer choice regex A–K) -----
      const OPT_RE = /^(?:[0oOQ©®°]\s{0,3})?([A-Ka-k])\s{0,2}[)]\s{0,4}(.{2,})/;
      const CA_RE  = /correct\s+answer\s*[:\-.]\s*([A-Ka-k])(?:[.\s,]|$)/i;

      const optTests = [
        { input: 'A) Generalized anxiety disorder',    expectLetter: 'A' },
        { input: 'G) Occipital neuralgia',             expectLetter: 'G' },
        { input: 'H) Post-traumatic headache',         expectLetter: 'H' },
        { input: 'I) Subdural hematoma',               expectLetter: 'I' },
        { input: 'J) Tension-type headache',           expectLetter: 'J' },
        { input: 'K) Trigeminal neuralgia',            expectLetter: 'K' },
        { input: 'A )  Generalized anxiety disorder',  expectLetter: 'A' },
        { input: 'G )  Occipital neuralgia',           expectLetter: 'G' },
      ];

      optTests.forEach(t => {
        const m = t.input.match(OPT_RE);
        if (m && m[1].toUpperCase() === t.expectLetter) {
          pass('OPT_RE matches: ' + t.input);
        } else {
          fail('OPT_RE failed: ' + t.input, 'Got: ' + (m ? m[1] : 'no match'));
        }
      });

      const caTests = [
        { input: 'Correct Answer: C.', expectLetter: 'C' },
        { input: 'Correct Answer: K.', expectLetter: 'K' },
        { input: 'Correct Answer: J ',  expectLetter: 'J' },
        { input: 'Incorrect Answers: A, B', expectNull: true },
      ];

      caTests.forEach(t => {
        const m = t.input.match(CA_RE);
        if (t.expectNull) {
          if (!m) pass('CA_RE correctly ignores: ' + t.input);
          else fail('CA_RE should not match: ' + t.input, 'Got: ' + m[1]);
        } else {
          if (m && m[1].toUpperCase() === t.expectLetter) {
            pass('CA_RE matches: ' + t.input);
          } else {
            fail('CA_RE failed: ' + t.input, 'Got: ' + (m ? m[1] : 'no match'));
          }
        }
      });

      // ----- joinItems() phantom-space threshold -----
      const phantomItems = [
        { str: 'p',      x0: 10, width: 5,  transform: [10,0,0,10,0,0] },
        { str: 'atient', x0: 14, width: 30, transform: [10,0,0,10,0,0] }
        // gap = 14 - (10+5) = -1, well under threshold → merge without space
      ];

      const realSpaceItems = [
        { str: 'the',     x0: 10, width: 15, transform: [10,0,0,10,0,0] },
        { str: 'patient', x0: 30, width: 35, transform: [10,0,0,10,0,0] }
        // gap = 30 - (10+15) = 5, over threshold → keep space
      ];

      const merged = joinItems(phantomItems);
      if (merged === 'patient') {
        pass('Phantom space: "p" + "atient" merged correctly to "patient"');
      } else {
        fail('Phantom space: merge failed', 'Got: "' + merged + '"');
      }

      const spaced = joinItems(realSpaceItems);
      if (spaced === 'the patient') {
        pass('Real space: "the" + "patient" kept space correctly');
      } else {
        fail('Real space: space was incorrectly removed', 'Got: "' + spaced + '"');
      }

      const src = joinItems.toString();
      if (src.includes('0.6')) {
        pass('Threshold: joinItems() uses 0.6 multiplier');
      } else {
        fail('Threshold: joinItems() does NOT use 0.6',
             'Found: ' + (src.match(/estCharW \* ([\d.]+)/) || ['','not found'])[1]);
      }

      // ----- splitLabValues() -----
      const labLine1    = 'Na+ 121 mEq/L Cl- 86 mEq/L K+ 3.0 mEq/L';
      const labLine2    = 'Hematocrit 44% Leukocyte count 9600/mm3';
      const notALabLine = 'Which of the following is the most likely cause?';

      const result1 = splitLabValues(labLine1);
      if (Array.isArray(result1) && result1.length === 3) {
        pass('Lab split: 3 entries extracted from Na/Cl/K line');
      } else {
        fail('Lab split: wrong count from Na/Cl/K line',
             'Got ' + (Array.isArray(result1) ? result1.length : typeof result1) + ' entries: ' + JSON.stringify(result1));
      }

      const result2 = splitLabValues(labLine2);
      if (Array.isArray(result2) && result2.length >= 1) {
        pass('Lab split: Hematocrit/Leukocyte line processed');
      } else {
        fail('Lab split: Hematocrit line not handled', JSON.stringify(result2));
      }

      const result3 = splitLabValues(notALabLine);
      if (!Array.isArray(result3) || result3.length <= 1) {
        pass('Lab split: non-lab line left unchanged');
      } else {
        fail('Lab split: non-lab line was incorrectly split', JSON.stringify(result3));
      }

      // ----- renderStem() lab-value table generation -----
      const labParagraphs = [
        'Na+ 121 mEq/L',
        'Cl- 86 mEq/L',
        'K+ 3.0 mEq/L',
        'HCO3- 28 mEq/L',
        'Ca2+ 9.6 mg/dL'
      ];

      const mixedParagraphs = [
        'Laboratory studies show:',
        'Na+ 121 mEq/L',
        'Cl- 86 mEq/L',
        'Which of the following is the most likely cause?'
      ];

      const html1 = renderStem(labParagraphs);
      if (html1.includes('<table') && html1.includes('Na+') && html1.includes('121 mEq/L')) {
        pass('Lab render: lab paragraphs rendered as <table>');
      } else {
        fail('Lab render: no <table> found in output', 'Got: ' + html1.substring(0, 200));
      }

      const html2 = renderStem(mixedParagraphs);
      if (html2.includes('<table') && html2.includes('Laboratory studies') && html2.includes('most likely cause')) {
        pass('Lab render: mixed content renders table alongside normal paragraphs');
      } else {
        fail('Lab render: mixed content not handled correctly', 'Got: ' + html2.substring(0, 300));
      }

      const styleContent = Array.from(document.styleSheets).some(ss => {
        try {
          return Array.from(ss.cssRules).some(r => r.selectorText && r.selectorText.includes('lab-values-table'));
        } catch(e) { return false; }
      });
      if (html1.includes('lab-values-table') || html1.includes('border-collapse')) {
        pass('Lab render: table has expected styling');
      } else {
        fail('Lab render: table missing .lab-values-table class or inline styles', '');
      }

      // ----- hasFigureReference() -----
      const figureTexts = [
        'The patient\'s drawing is shown in Figure 1.',
        'Figure 2 shows the result.',
        'The radiograph is shown below.',
        'Shown above is the MRI result.',
        'See the photograph for details.',
      ];

      const nonFigureTexts = [
        'Which of the following is the most likely diagnosis?',
        'The patient has hypertension and diabetes.',
        'Laboratory studies show Na+ 121 mEq/L.',
      ];

      figureTexts.forEach(t => {
        if (hasFigureReference(t)) {
          pass('Figure detection: correctly detected in: "' + t.substring(0, 50) + '"');
        } else {
          fail('Figure detection: missed reference in: "' + t + '"', '');
        }
      });

      nonFigureTexts.forEach(t => {
        if (!hasFigureReference(t)) {
          pass('Figure detection: correctly ignored: "' + t.substring(0, 50) + '"');
        } else {
          fail('Figure detection: false positive on: "' + t + '"', '');
        }
      });

      const indexSource = ''; // cannot read index.html from test.html directly
      info('Figure placeholder: manually verify in index.html that "__FIGURE__:" token is used in parseOneQuestion() and rendered as &lt;img&gt; in the quiz renderer');
    }

    window.onload = runTests;
  </script>
</body>
</html>
